name: Create new release

on:
  push:
    branches:
      - "**"
    tags:
      - "!**"

jobs:
  build:
    name: Build
    runs-on: ubuntu-22.04
    #runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Install fuse and libfuse2
      run: sudo apt install fuse libfuse2

    - name: Get Conty
      run: |
        set -x
        # Conty 1.18.6 - last version with Glibc 2.33, see pkg_list.txt - https://github.com/Kron4ek/Conty/releases/tag/1.18.6
        # To resolve the error: import _webrtcvad
        # ImportError: /lib64/libc.so.6: version `GLIBC_2.34' not found (required by .../_webrtcvad.cpython-310-x86_64-linux-gnu.so)

        #wget -q https://github.com/Kron4ek/Conty/releases/download/1.18.6/conty.sh
        wget -q https://github.com/ryuuzaki42/Python_to_make_AppImage/releases/download/07/conty.sh
        chmod +x conty.sh
        pwd; ls -lah

    - name: Get appimagetool
      run: |
        set -x
        version_go_appimage=$(wget -q -O - https://api.github.com/repos/probonopd/go-appimage/releases | grep "\"name.*appimagetool-.*-x86_64.AppImage\"" | head -n 1 | cut -d '-' -f2)
        echo "version_go_appimage: $version_go_appimage"
        wget -q "https://github.com/probonopd/go-appimage/releases/download/continuous/appimagetool-$version_go_appimage-x86_64.AppImage" -O appimagetool-x86_64.AppImage
        chmod +x appimagetool-x86_64.AppImage
        pwd; ls -lah

    - name: Get Pyhton AppImage
      run: |
        set -x
        # OK
        #wget -q https://github.com/niess/python-appimage/releases/download/python3.10/python3.10.6-cp310-cp310-manylinux2010_x86_64.AppImage
        wget -q https://github.com/ryuuzaki42/Python_to_make_AppImage/releases/download/06/python3.13.3-cp313-cp313-manylinux2014_x86_64.AppImage
        fileName=$(ls python3*.AppImage)
        chmod +x "$fileName"
        ./"$fileName" --appimage-extract
        pwd; ls -lah

    - name: Install FFsubsync and update pip
      run: |
        set -x
        cd squashfs-root/opt/python3*/bin/
        pwd; ls -lah

        ../../../../conty.sh ldd --version

        ../../../../conty.sh ./pip3.* install ffsubsync

        ./python3.* -m pip install --upgrade pip

    - name: Make AppImage
      run: |
        set -x
        tag=2 #1
        version=$(grep -o "FFsubsync:.*" README.md | cut -d ' ' -f2)
        echo "FFsubsync version: $version - Tag: $tag"

        cd squashfs-root/
        pwd; ls -lah

        rm -v python.png python*.desktop .DirIcon AppRun # Remove folders/files not needed

        #find . | grep -E "\.png|\.jpg|\.svg"
        wget -q https://raw.githubusercontent.com/smacke/ffsubsync/refs/heads/master/resources/img/subsync.png -O FFsubsync.png

        #find . | grep ".desktop"

        echo '[Desktop Entry]
        Type=Application
        Name=FFsubsync
        Exec=FFsubsync
        Comment=Automagically synchronize subtitles with video
        Icon=FFsubsync
        Categories=Utility
        Terminal=true' > FFsubsync.desktop
        chmod +x FFsubsync.desktop
        cat FFsubsync.desktop
        pwd; ls -lah

        cd ../
        cp AppRun README.md squashfs-root/
        ls -lah squashfs-root/

        # Wrong permissions on AppDir, please set it to 0755 and try again
        chmod 0755 squashfs-root/

        ARCH=x86_64 VERSION="${version}-${tag}_JB" ./appimagetool-x86_64.AppImage squashfs-root/
        pwd; ls -lah

        fileName=$(ls FFsubsync*.AppImage)
        echo "fileName: $fileName"
        md5sum "$fileName" > "${fileName}.md5"
        pwd; ls -lah

    - uses: xresloader/upload-to-github-release@v1
      env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
          file: "FFsubsync*.AppImage; FFsubsync*.zsync; FFsubsync*.md5"
          #overwrite: true
          verbose: true
          draft: false
          default_release_name: "FFsubsync V in AppImage"
